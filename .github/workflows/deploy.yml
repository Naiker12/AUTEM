name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/

      - name: Configure SPA redirect in 404.html
        run: |
          # Count path segments in BASE_PATH (e.g. "/AUTEM/" -> 1, "/" -> 0)
          SEGMENTS=$(echo "/${{ github.event.repository.name }}/" | sed 's|^/||;s|/$||' | awk -F'/' '{if($1=="") print 0; else print NF}')
          sed -i "s/pathSegmentsToKeep = 0/pathSegmentsToKeep = ${SEGMENTS}/" dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
