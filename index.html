      content="Propiedades con renders 3D, tours virtuales y realidad aumentada para que las recorras, personalices y veas antes de la primera piedra."
    />
    <meta property="og:title" content="AUTEM" />

      property="og:description"
      content="Propiedades que puedes recorrer, personalizar y ver en tu propio espacio antes de que exista la primera piedra."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..500;1,9..144,300..500&family=Inter:wght@300;400;500;600&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Decode "?/path" query string written by 404.html back into the real URL
      (function (l) {
        if (l.search && l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          var base = l.pathname.replace(/\/+$/, "");
          window.history.replaceState(
            null,
            null,
            base + "/" + decoded + l.hash
          );
        }
      })(window.location);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
